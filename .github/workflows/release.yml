name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  build-binaries:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-linux-x64
            out: garu-linux-x64
          - target: bun-darwin-arm64
            out: garu-darwin-arm64
          - target: bun-darwin-x64
            out: garu-darwin-x64
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.1.38

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compile binary
        env:
          BUN_TARGET: ${{ matrix.target }}
          BUN_OUTFILE: ${{ matrix.out }}
        run: |
          bun build ./src/index.ts \
            --compile \
            --target="$BUN_TARGET" \
            --outfile="$BUN_OUTFILE"

      - name: Compute binary checksum
        env:
          BUN_OUTFILE: ${{ matrix.out }}
        run: sha256sum "$BUN_OUTFILE" > "$BUN_OUTFILE.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.out }}
          path: |
            ${{ matrix.out }}
            ${{ matrix.out }}.sha256

  release:
    name: Publish release + npm
    needs: build-binaries
    runs-on: ubuntu-latest
    # We can't reference `secrets.*` directly in `if:`, so hoist it to a job-level env var
    # and gate the npm publish step on that. This lets tagging still create GitHub releases
    # (with binaries attached) even before NPM_TOKEN is added to repo secrets.
    env:
      HAS_NPM_TOKEN: ${{ secrets.NPM_TOKEN != '' }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Assert package.json version matches tag
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          if [[ "$PKG_VERSION" != "$TAG_NAME" ]]; then
            echo "::error::package.json version ($PKG_VERSION) does not match tag ($TAG_NAME)"
            exit 1
          fi
          echo "Version check passed: $PKG_VERSION"

      - name: Build npm package
        run: npm run build

      - name: Download all binaries
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: binaries

      - name: Flatten binary layout
        run: |
          mkdir -p dist-binaries
          find binaries -type f -exec mv {} dist-binaries/ \;
          ls -la dist-binaries

      - name: Verify artifact checksums
        working-directory: dist-binaries
        run: |
          for f in *.sha256; do
            sha256sum -c "$f"
          done
          rm -f *.sha256

      - name: Generate SHA256SUMS
        working-directory: dist-binaries
        run: sha256sum garu-* > SHA256SUMS.txt

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "$TAG_NAME" \
            dist-binaries/garu-* \
            dist-binaries/SHA256SUMS.txt \
            --title "$TAG_NAME" \
            --generate-notes

      - name: Publish to npm
        if: env.HAS_NPM_TOKEN == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance
