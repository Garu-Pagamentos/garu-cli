name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  build-binaries:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-linux-x64
            out: garu-linux-x64
          - target: bun-darwin-arm64
            out: garu-darwin-arm64
          - target: bun-darwin-x64
            out: garu-darwin-x64
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.1.38

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compile binary
        env:
          BUN_TARGET: ${{ matrix.target }}
          BUN_OUTFILE: ${{ matrix.out }}
        run: |
          bun build ./src/index.ts \
            --compile \
            --target="$BUN_TARGET" \
            --outfile="$BUN_OUTFILE"

      - name: Compute binary checksum
        env:
          BUN_OUTFILE: ${{ matrix.out }}
        run: sha256sum "$BUN_OUTFILE" > "$BUN_OUTFILE.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.out }}
          path: |
            ${{ matrix.out }}
            ${{ matrix.out }}.sha256

  release:
    name: Publish release + npm
    needs: build-binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Assert package.json version matches tag
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          if [[ "$PKG_VERSION" != "$TAG_NAME" ]]; then
            echo "::error::package.json version ($PKG_VERSION) does not match tag ($TAG_NAME)"
            exit 1
          fi
          echo "Version check passed: $PKG_VERSION"

      - name: Build npm package
        run: npm run build

      - name: Download all binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: binaries

      - name: Flatten binary layout
        run: |
          mkdir -p dist-binaries
          find binaries -type f -exec mv {} dist-binaries/ \;
          ls -la dist-binaries

      - name: Verify artifact checksums
        working-directory: dist-binaries
        run: |
          for f in *.sha256; do
            sha256sum -c "$f"
          done
          rm -f *.sha256

      - name: Generate SHA256SUMS
        working-directory: dist-binaries
        run: sha256sum garu-* > SHA256SUMS.txt

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "$TAG_NAME" \
            dist-binaries/garu-* \
            dist-binaries/SHA256SUMS.txt \
            --title "$TAG_NAME" \
            --generate-notes

      - name: Publish to npm
        run: npm publish --access public --provenance
